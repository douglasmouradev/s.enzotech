# Enzo Tech — Apache VirtualHost
# Domínio: enzotech.tdesksolutions.com.br
# DocumentRoot: /www/wwwroot/enzotech.tdesksolutions.com.br

<VirtualHost *:80>
    ServerName enzotech.tdesksolutions.com.br
    DocumentRoot /www/wwwroot/enzotech.tdesksolutions.com.br

    <Directory /www/wwwroot/enzotech.tdesksolutions.com.br>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/enzotech-error.log
    CustomLog ${APACHE_LOG_DIR}/enzotech-access.log combined
</VirtualHost>
