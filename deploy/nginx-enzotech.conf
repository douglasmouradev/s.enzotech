# Enzo Tech — Nginx (aaPanel / BT Panel)
# Domínio: enzotech.tdesksolutions.com.br
# Caminho: /www/wwwroot/enzotech.tdesksolutions.com.br
#
# IMPORTANTE: HTTP (80) e HTTPS (443) devem usar a MESMA pasta root.
# Se https:// abrir outro sistema (ex.: Baba PRO), o vhost SSL está apontando
# para a pasta errada ou o domínio foi adicionado como alias em outro site.
# Corrija no aaPanel: Website → enzotech → SSL → Let's Encrypt → Apply.

server {
    listen 80;
    listen [::]:80;
    server_name enzotech.tdesksolutions.com.br;

    root /www/wwwroot/enzotech.tdesksolutions.com.br;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 12M;

    location ~ ^/(config|includes|logs|vendor|tests|database)/ {
        deny all;
        return 404;
    }

    location ~* ^/(database.*\.sql|composer\.(json|lock)|\.env|\.git) {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 7d;
        access_log off;
    }

    location ~ /\. {
        deny all;
    }
}

# O aaPanel cria automaticamente o bloco :443 ao aplicar SSL.
# Verifique em /www/server/panel/vhost/nginx/enzotech.tdesksolutions.com.br.conf
# que a linha root aponta para:
#   /www/wwwroot/enzotech.tdesksolutions.com.br
# e NÃO para a pasta do Baba PRO ou outro projeto.
